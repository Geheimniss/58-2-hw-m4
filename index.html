<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>The Empire | Total War: Warhammer</title>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="container">
            <div class="inner_header">
                <a href="index.html">
                    <div class="logotype">
                        <h2>Warhammer<span> Roster</span></h2>
                    </div>
                </a>
                <ul class="menu">
                    <li class="menu_link"><a href="./pages/roster.html">Войска</a></li>
                    <li class="menu_link"><a href="./pages/lessons.html">Гримуар Магии</a></li>
                    <li class="menu_link"><a href="./pages/home_works.html">Казармы</a></li>
                    <li class="menu_link"><a href="./pages/monster.html">Бестиарий</a></li>
                </ul>
                <button class="btn" id="btn-summon">Призвать Графов!</button>
            </div>
        </div>
    </div>

    <div class="hero_block">
        <div class="container">
            <div class="inner_hero">
                <h1>За Императора и Зигмара!</h1>
                <p class="subtitle">Империя людей стоит на страже Старого Света. Объедини провинции и поведи стальные легионы в бой.</p>
                <div class="trailer_container">
                    <video controls autoplay loop playsinline style="width: 100%; height: 100%; object-fit: cover;">
                        <source src="./assets/trailer.mp4" type="video/mp4">
                        Ваш браузер не поддерживает видео.
                    </video>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <a href="#" target="_blank">
                <div class="inner_footer">
                    <h2>Сковано в кузнях Нульна</h2>
                </div>
            </a>
        </div>
    </div>
</div>

<div class="modal" id="diplomacyModal">
    <div class="modal_dialog">
        <div class="modal_content">
            <div class="modal_close" id="closeModal">&#10006;</div>
            <div class="modal_title">Имперская Канцелярия</div>
            <p class="modal_subtitle">Срочное донесение для Императора</p>
            
            <form action="#" id="diplomacyForm">
                <input required placeholder="Ваш титул (Например: Курфюрст)" name="name" type="text" class="modal_input">
                <input required placeholder="Куда отправить ответного ворона?" name="contact" type="text" class="modal_input">
                <button class="btn" type="submit">Отправить гонца</button>
            </form>
        </div>
    </div>
</div>

<script src="./js/chaos.js"></script>
<script src="./js/main.js"></script>
</body>
<script src="./js/modal.js"></script>
</html>
